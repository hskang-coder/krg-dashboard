const CSV_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=0`;

function parseCSV(text){
  const lines=text.trim().split("\n");
  if(lines.length<2)return[];
  return lines.slice(1).map(line=>{
    const f=[];let c="",q=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){q=!q;continue}
      if(ch===','&&!q){f.push(c);c="";continue}
      c+=ch;
    }
    f.push(c);
    return{g:parseInt(f[0]),lhat:parseFloat(f[2]),r:parseFloat(f[3]),d:parseInt(f[6])};
  }).filter(d=>!isNaN(d.g)&&!isNaN(d.lhat));
}

function computeMetrics(data){
  const total=data.length;
  const delCnt=data.filter(d=>d.d===1).length;
  const overallRate=delCnt/total;
  const grades=[...new Set(data.map(d=>d.g))].sort((a,b)=>a-b);
  const gradeData=grades.map(g=>{
    const items=data.filter(d=>d.g===g);
    const cnt=items.length;
    const dc=items.filter(d=>d.d===1).length;
    const rate=dc/cnt;
    const withZ=items.map(d=>{
      const z=d.r/d.lhat;
      const good=(z<=1.0&&d.d===0)?1:0;
      return{...d,z,good};
    }).sort((a,b)=>a.z-b.z);
    const totalGood=withZ.filter(d=>d.good===1).length;
    let gc=0,ps=0;
    withZ.forEach((d,idx)=>{if(d.good===1){gc++;ps+=gc/(idx+1)}});
    const ap=totalGood>0?ps/totalGood:0;
    return{grade:g,contracts:cnt,delinquent:dc,rate,
      ratePct:(rate*100).toFixed(1),good:totalGood,ap,
      apRound:(ap*100).toFixed(1),items:withZ};
  });
  const mAP=gradeData.reduce((s,d)=>s+d.ap,0)/gradeData.length;
  return{total,delinquentCount:delCnt,overallRate,gradeData,mAP};
}

              React.createElement(XAxis,{dataKey:"grade",tick:{fontSize:12},label:{value:"毛聯卤锚赂聣",position:"insideBottom",offset:-2,fontSize:12}}),
              React.createElement(YAxis,{tick:{fontSize:12},label:{value:"%",angle:-90,position:"insideLeft",fontSize:12},domain:[0,100]}),
              React.createElement(Tooltip,{content:React.createElement(CustomTooltip,{type:"pct"})}),

          React.createElement(ResponsiveContainer,{width:"100%",height:300},

              React.createElement(CartesianGrid,{strokeDasharray:"3 3",stroke:"#f1f5f9"}),
