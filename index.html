const {useState,useMemo,useEffect,useCallback,useRef}=React;
const {ResponsiveContainer,ComposedChart,BarChart,Bar,XAxis,YAxis,

function parseExcel(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1});
        if(rows.length<2){reject("데이터가 비어있습니다.");return}
        const hdr=rows[0].map(h=>String(h).trim().toLowerCase());
        const gi=hdr.findIndex(h=>/^(g|grade|등급)$/i.test(h));
        const li=hdr.findIndex(h=>/^(lhat|l_hat|l̂|한도|credit.?limit)$/i.test(h));
        const ri=hdr.findIndex(h=>/^(r|repay|상환|actual)$/i.test(h));
        const di=hdr.findIndex(h=>/^(d|delinq|연체|default)$/i.test(h));
        let gIdx=gi,lIdx=li,rIdx=ri,dIdx=di;
        if(gIdx<0)gIdx=0;
        if(lIdx<0)lIdx=2;
        if(rIdx<0)rIdx=3;
        if(dIdx<0)dIdx=6;
        const data=[];
        for(let i=1;i<rows.length;i++){
          const row=rows[i];
          if(!row||row.length===0)continue;
          const g=parseInt(row[gIdx]);
          const lhat=parseFloat(row[lIdx]);
          const r=parseFloat(row[rIdx]);
          const d=parseInt(row[dIdx]);
          if(!isNaN(g)&&!isNaN(lhat)&&lhat!==0)data.push({g,lhat,r:isNaN(r)?0:r,d:isNaN(d)?0:d});
        }
        if(data.length===0){reject("유효한 데이터를 찾을 수 없습니다. 엑셀 컬럼을 확인해주세요.");return}
        resolve(data);
      }catch(err){reject("엑셀 파싱 오류: "+err.message)}
    };
    reader.onerror=()=>reject("파일 읽기 실패");
    reader.readAsArrayBuffer(file);
  });
}
function computeMetrics(data){
  const total=data.length;
  const delCnt=data.filter(d=>d.d===1).length;
  const overallRate=delCnt/total;
  const grades=[...new Set(data.map(d=>d.g))].sort((a,b)=>a-b);
  const gradeData=grades.map(g=>{
    const items=data.filter(d=>d.g===g);
    const cnt=items.length;
    const dc=items.filter(d=>d.d===1).length;
    const rate=dc/cnt;
    const withZ=items.map(d=>{
      const z=d.r/d.lhat;
      const good=(z<=1.0&&d.d===0)?1:0;
      return{...d,z,good};
    }).sort((a,b)=>a.z-b.z);
    const totalGood=withZ.filter(d=>d.good===1).length;
    let gc=0,ps=0;
    withZ.forEach((d,idx)=>{if(d.good===1){gc++;ps+=gc/(idx+1)}});
    const ap=totalGood>0?ps/totalGood:0;
    return{grade:g,contracts:cnt,delinquent:dc,rate,
      ratePct:(rate*100).toFixed(1),good:totalGood,ap,
      apRound:(ap*100).toFixed(1),items:withZ};
  });
  const mAP=gradeData.reduce((s,d)=>s+d.ap,0)/gradeData.length;
  return{total,delinquentCount:delCnt,overallRate,gradeData,mAP};
}

}
function UploadScreen({onDataLoaded}){
  const[dragOver,setDragOver]=useState(false);
  const[error,setError]=useState(null);
  const[loading,setLoading]=useState(false);
  const fileRef=useRef(null);

  const handleFile=async(file)=>{
    if(!file)return;
    const ext=file.name.split('.').pop().toLowerCase();
    if(!['xlsx','xls','csv'].includes(ext)){setError("xlsx, xls, csv 파일만 지원합니다.");return}
    setLoading(true);setError(null);
    try{
      const data=await parseExcel(file);
      onDataLoaded(data,file.name);
    }catch(e){setError(typeof e==='string'?e:e.message)}
    finally{setLoading(false)}
  };

  const onDrop=e=>{e.preventDefault();setDragOver(false);handleFile(e.dataTransfer.files[0])};
  const onDragOver=e=>{e.preventDefault();setDragOver(true)};
  const onDragLeave=()=>setDragOver(false);
  return React.createElement("div",{style:{display:"flex",flexDirection:"column",
    alignItems:"center",justifyContent:"center",minHeight:"100vh",background:C.bg,padding:40}},
    React.createElement("div",{style:{marginBottom:32,textAlign:"center"}},
      React.createElement("h1",{style:{fontSize:28,fontWeight:800,color:C.text,letterSpacing:-0.5}},
        "심사 한도 정확도 대시보드"),
      React.createElement("p",{style:{fontSize:14,color:C.textSub,marginTop:8}},
        "엑셀 파일을 업로드하면 자동으로 분석됩니다")
    ),
    React.createElement("div",{
      className:"upload-zone"+(dragOver?" drag-over":""),
      onDrop,onDragOver,onDragLeave,
      onClick:()=>fileRef.current&&fileRef.current.click()},
      React.createElement("input",{ref:fileRef,type:"file",
        accept:".xlsx,.xls,.csv",style:{display:"none"},
        onChange:e=>handleFile(e.target.files[0])}),
      loading
        ? React.createElement("div",null,
            React.createElement("div",{style:{fontSize:48,marginBottom:16}},"⏳"),
            React.createElement("p",{style:{fontSize:16,color:C.primary,fontWeight:600}},"파일 분석 중..."))
        : React.createElement("div",null,
            React.createElement("div",{style:{fontSize:56,marginBottom:16}},"📂"),
            React.createElement("p",{style:{fontSize:18,fontWeight:700,color:C.text,marginBottom:8}},
              "여기에 엑셀 파일을 드래그하거나 클릭하세요"),
            React.createElement("p",{style:{fontSize:13,color:C.textSub}},
              "지원 형식: .xlsx, .xls, .csv"))
    ),
    error&&React.createElement("div",{style:{marginTop:20,padding:"12px 24px",
      background:"#fef2f2",border:"1px solid #fecaca",borderRadius:12,color:"#dc2626",
      fontSize:14,fontWeight:600,maxWidth:600}}, "⚠️ "+error),
    React.createElement("div",{style:{marginTop:40,padding:24,background:C.card,
      borderRadius:16,maxWidth:600,width:"100%",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}},
      React.createElement("h3",{style:{fontSize:14,fontWeight:700,color:C.text,marginBottom:12}},
        "📋 필요한 엑셀 컬럼"),
      React.createElement("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:13}},

          React.createElement("tr",{style:{borderBottom:"2px solid "+C.grayLight}},
            ["컬럼명","설명","예시"].map(h=>
              React.createElement("th",{key:h,style:{padding:"8px 12px",textAlign:"left",
                color:C.textSub,fontWeight:600,fontSize:12}},h)))),
        React.createElement("tbody",null,
          [["g 또는 grade","등급 번호","1, 2, 3, ..."],
           ["lhat 또는 l_hat","심사 한도(L̂)","5000000"],
           ["r 또는 repay","실제 상환액(R)","4200000"],
           ["d 또는 delinq","연체 여부 (0/1)","0"]
          ].map((row,i)=>
            React.createElement("tr",{key:i,style:{borderBottom:"1px solid "+C.grayLight}},
              row.map((cell,j)=>React.createElement("td",{key:j,style:{padding:"8px 12px",
                fontWeight:j===0?600:400,color:j===0?C.primary:C.text}},cell))))))
    )

}

          React.createElement("button",{onClick:handleReset,style:{background:C.grayLight,color:C.text,
            border:"none",borderRadius:10,padding:"8px 18px",fontSize:13,fontWeight:600,
            cursor:"pointer"}},"↩ 초기화")
        )
      ),
      // KPI Cards
      React.createElement("div",{style:{display:"flex",gap:20,marginBottom:32,flexWrap:"wrap"}},
        React.createElement(KpiCard,{title:"전체 계약",value:total.toLocaleString()+"건",
          sub:`등급 1~${gradeData.length} · 엑셀 업로드`,color:C.primary,icon:"📋"}),
        React.createElement(KpiCard,{title:"30일 이상 연체율",value:(overallRate*100).toFixed(1)+"%",
          sub:`${delinquentCount}건 / ${total}건`,color:C.danger,icon:"⚠️"}),

        // Delinquency Rate Chart
        React.createElement("div",{style:{background:C.card,borderRadius:16,padding:24,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}},
          React.createElement("h3",{style:{fontSize:16,fontWeight:700,color:C.text,marginBottom:4}},"등급별 30일 이상 연체율"),

                  fill:selectedGrade===i+1?C.primary:entry.AP>=mAP?C.success:C.warning,
                  opacity:selectedGrade&&selectedGrade!==i+1?0.35:0.85})))

          ),

            React.createElement(CartesianGrid,{strokeDasharray:"3 3",stroke:"#f1f5f9"}),
            React.createElement(XAxis,{dataKey:"grade",type:"number",name:"등급",
              domain:selectedGrade?[selectedGrade-0.5,selectedGrade+0.5]:[0.5,gradeData.length+0.5],
              tick:{fontSize:12},label:{value:"등급",position:"insideBottom",offset:-8,fontSize:12},
              ticks:selectedGrade?[selectedGrade]:gradeData.map(g=>g.grade)}),
            React.createElement(YAxis,{dataKey:"z",type:"number",name:"z",tick:{fontSize:12},
              label:{value:"z = R / L̂",angle:-90,position:"insideLeft",offset:5,fontSize:12},
              domain:[0.3,"auto"]}),
            React.createElement(ZAxis,{range:[50,50]}),
            React.createElement(ReferenceLine,{y:1.0,stroke:C.danger,strokeDasharray:"6 4",strokeWidth:2}),
            React.createElement(Scatter,{data:(selectedGrade
              ?gradeData.filter(gd=>gd.grade===selectedGrade).flatMap(gd=>gd.items)
              :gradeData.flatMap(gd=>gd.items))
              .filter(d=>d.good===1).map(d=>({z:parseFloat(d.z.toFixed(3)),grade:d.g,good:1})),
              fill:C.success,opacity:0.7,name:"Good"}),
            React.createElement(Scatter,{data:(selectedGrade
              ?gradeData.filter(gd=>gd.grade===selectedGrade).flatMap(gd=>gd.items)
              :gradeData.flatMap(gd=>gd.items))
              .filter(d=>d.good===0).map(d=>({z:parseFloat(d.z.toFixed(3)),grade:d.g,good:0})),
              fill:C.danger,opacity:0.5,name:"Not Good"}),
            React.createElement(Legend,{wrapperStyle:{fontSize:12}})
          )
        )
      ),
      // Footer
      React.createElement("div",{style:{textAlign:"center",padding:"16px 0 32px",fontSize:12,color:C.textSub}},
        `KRG그룹 심사 한도 정확도 대시보드 · 파일: ${fileName} · ${total}건 · mAP ${(mAP*100).toFixed(1)}%`)
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Dashboard));
</script>
</body>
</html>
